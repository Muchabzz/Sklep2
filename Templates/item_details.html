{% load static %}

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="header">

    <div class="logo">
        <a href="{% url 'home' %}">
            <img src="{% static 'grafika/logo.png' %}" alt="logo">
        </a>
    </div>

    <nav class="menu">
        <a href="{% url 'home' %}">Strona główna</a>
        <a href="{% url 'kontakt' %}">Kontakt</a>

        {% if user.is_authenticated %}
            <a href="{% url 'panel' %}">
                {{ user.username }}
            </a>
        {% else %}
            <a href="{% url 'login' %}">
                Zaloguj się
            </a>
        {% endif %}
    </nav>

    <div class="koszyk">
            <a href="{% url 'cart' %}"><img src="{% static 'grafika/cart.png' %}" alt="koszyk"></a>
        </div>

</header>

    <section class="details-container">

        <div class="details-box">

            {% if product.image %}
                <img src="{% static 'grafika/' %}{{ product.image }}"
                    alt="{{ product.name }}"
                    class="details-img">
            {% else %}
                <img src="{% static 'grafika/produkt1.png' %}"
                    alt="brak zdjęcia"
                    class="details-img">
            {% endif %}

            <div class="details-info">
                <h1>{{ product.name }}</h1>

                <p class="details-price">{{ product.price }} zł</p>

                <p class="details-description">
                    {{ product.description }}
                </p>

                <a href="{% url 'add_to_cart' product.id %}" class="details-btn">
                    Dodaj do koszyka
                </a>
            </div>

        </div>

    </section>

</body>
</html>
