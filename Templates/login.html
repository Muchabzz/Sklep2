{% load static %}
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>YuluKids</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="{% url 'home' %}"><img src="{% static 'grafika/logo.png' %}" alt="logo"></a>
        </div>
        <nav class="menu">
            <a href="{% url 'home' %}">Strona główna</a>
            <a href="{% url 'kontakt' %}">Kontakt</a>
            <a href="{% url 'login' %}">Zaloguj się</a>
        </nav>
        <div class="koszyk">
            <a href="{% url 'cart' %}"><img src="{% static 'grafika/cart.png' %}" alt="koszyk"></a>
        </div>
    </header>
    <section class="login-container">
    <div class="login-box">
        <h1>Zaloguj się</h1>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Nazwa użytkownika" required>
            <input type="password" id="password" name="password" placeholder="Hasło" required>
            <button type="submit">Zaloguj się</button>
        </form>

        <p class="register-text">
            Nie masz konta?
            <a href="{% url 'register' %}">Zarejestruj się</a>
        </p>
    </div>
</section>


    
    <footer class="footer">
  <div class="footer-container">

    <!-- LEWA -->
    <div class="footer-left">
      <a href="{% url 'home' %}">
        <img src="{% static 'grafika/logo.png' %}" alt="logo">
      </a>
      <p>Sukienki dla małych księżniczek<br>na każdą wyjątkową chwilę.</p>
      
    </div>

    <!-- PRAWA -->
    <div class="footer-right">
      <h4>Kontakt</h4>
      <p>ul. Kwiatowa 12<br>00-123 Warszawa</p>
      <p><i class="fas fa-phone"></i> +48 123 456 789</p>
      <p><i class="fas fa-envelope"></i> kontakt@YuluKids.pl</p>
      <p><i class="fas fa-clock"></i> Pon. - Pt.: 9:00 - 17:00</p>
    </div>

  </div>
</footer>
<script>
const passwordInput = document.getElementById("password");

passwordInput.addEventListener("input", function () {

    const value = passwordInput.value;
    const lastChar = value.slice(-1);

    passwordInput.type = "text";

    passwordInput.value =
        "•".repeat(value.length - 1) + lastChar;

    clearTimeout(passwordInput.timer);

    passwordInput.timer = setTimeout(() => {

        passwordInput.type = "password";
        passwordInput.value = value;

    }, 150);

});
</script>
</body>
</html>
